name: 'Reusable Link Check Workflow'

on:
  workflow_call:
    inputs:
      mkdocs_repo:
        required: true
        type: string
      docs_repo:
        required: true
        type: string
      mkdocs_repo_name:
        required: true
        type: string
      docs_repo_name:
        required: true
        type: string
      root_dir:
        required: false
        type: string
      url:
        required: false
        type: string
    secrets:
      GH_TOKEN:
        required: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Docs Repo'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.docs_repo }}
          path: docs-tmp
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0  # Fetch full history for proper diff

      - name: 'Fetch base branch for diff'
        working-directory: docs-tmp
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: 'Get list of added Markdown pages'
        id: added_pages
        working-directory: docs-tmp
        run: |
          git diff --name-status \
            origin/${{ github.event.pull_request.base.ref }}...HEAD | \
            awk '$1 == "A" && $2 ~ /\.md$/ {print $2}' > added_pages.txt

      - name: 'Checkout MkDocs Repo'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.mkdocs_repo }}
          path: ${{ inputs.mkdocs_repo_name }}

      - name: 'Move Docs into MkDocs Repo'
        run: |
          # Copy the added_pages.txt to the root before moving
          cp docs-tmp/added_pages.txt ./added_pages.txt
          mv docs-tmp \
            "${{ inputs.mkdocs_repo_name }}/${{ inputs.docs_repo_name }}"

      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 'Install dependencies'
        working-directory: ${{ inputs.mkdocs_repo_name }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Build MkDocs site'
        working-directory: ${{ inputs.mkdocs_repo_name }}
        run: |
          mkdocs build -d site

      - name: 'Convert added pages to excluded URLs'
        id: ignore_links
        if: ${{ inputs.url != '' }}
        run: |
          IGNORED_LINKS=""
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            PATH=$(echo "$FILE" | sed -e 's/^docs\///' \
              -e 's/index\.md$//' -e 's/\.md$//')
            URL="${{ inputs.url }}/${PATH}/"
            IGNORED_LINKS="$IGNORED_LINKS --exclude $URL"
          done < added_pages.txt
          echo "ignored=$IGNORED_LINKS" >> $GITHUB_OUTPUT

      - name: 'Prepare Lychee Arguments'
        id: lychee_args
        run: |
          ARGS="--root-dir $(pwd)/${{ inputs.mkdocs_repo_name }}/site \
            --no-progress --accept 429,403"
          if [[ -f "$(pwd)/${{ inputs.mkdocs_repo_name }}/.urlignore" ]]; then
            echo "Found .urlignore file. Adding to lychee arguments."
            ARGS="$ARGS --exclude-file \
              $(pwd)/${{ inputs.mkdocs_repo_name }}/.urlignore"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: 'Run Link Checker (lychee)'
        id: lychee
        uses: lycheeverse/lychee-action@v2.4.1
        with:
          args: >
            ${{ steps.lychee_args.outputs.args }}
            ${{ steps.ignore_links.outputs.ignored }}
            './${{ inputs.mkdocs_repo_name }}/site/**/*.html'
          fail: true
        continue-on-error: false
