name: 'Reusable Link Check Workflow'

on:
  workflow_call:
    inputs:
      mkdocs_repo:
        required: true
        type: string
      docs_repo:
        required: true
        type: string
      mkdocs_repo_name:
        required: true
        type: string
      docs_repo_name:
        required: true
        type: string
      root_dir:
        required: false
        type: string
      url:
        required: false
        type: string
    secrets:
      GH_TOKEN:
        required: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout MkDocs Repo'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.mkdocs_repo }}
          path: ${{ inputs.mkdocs_repo_name }}

      - name: 'Checkout Docs Repo'
        if: ${{ inputs.docs_repo != inputs.mkdocs_repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.docs_repo }}
          path: '${{ inputs.mkdocs_repo_name}}/${{ inputs.docs_repo_name}}'

      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 'Install dependencies'
        working-directory: ${{ inputs.mkdocs_repo_name }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Build MkDocs site'
        working-directory: ${{ inputs.mkdocs_repo_name }}
        run: |
          mkdocs build -d site

      - name: 'Get list of added Markdown pages'
        id: added_pages
        working-directory: ${{ inputs.mkdocs_repo_name}}
        run: |
          echo "Collecting newly added .md files..."
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff --name-status \
            origin/${{ github.event.pull_request.base.ref }}...HEAD | \
            awk '$1 == "A" && $2 ~ /\.md$/ {print $2}' > added_pages.txt
          cat added_pages.txt

      - name: Convert added pages to excluded URLs
        id: ignore_links
        if: ${{ inputs.url != '' }}
        run: |
          IGNORED_LINKS=""

          while read -r FILE; do
            # Only process non-empty lines
            [ -z "$FILE" ] && continue

            # Strip leading docs/ if present, remove .md, trim index.md
            PATH=$(echo "$FILE" | sed -e 's/^docs\///' \
              -e 's/index\.md$//' -e 's/\.md$//')
            URL="${{ inputs.mkdocs_repo_name }}/${PATH}/"
            IGNORED_LINKS="$IGNORED_LINKS --exclude $URL"
          done < added_pages.txt

          echo "ignored=$IGNORED_LINKS" >> $GITHUB_OUTPUT

      - name: Prepare Lychee Arguments
        id: lychee_args
        run: |
          ARGS="--root-dir $(pwd)/${{ inputs.mkdocs_repo_name }}/site \
            --no-progress --accept 429,403"
          if [[ -f "$(pwd)/${{ inputs.mkdocs_repo_name }}/.urlignore" ]]; then
            echo "Found .urlignore file. Adding to lychee arguments."
            ARGS="$ARGS --exclude-file \
              $(pwd)/${{ inputs.mkdocs_repo_name }}/.urlignore"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      # Run the link checker (lychee) on the built MkDocs site.
      - name: 'Run Link Checker (lychee)'
        id: lychee
        uses: lycheeverse/lychee-action@v2.4.1
        with:
          args: >
            ${{ steps.lychee_args.outputs.args }}
            ${{ steps.ignore_links.outputs.ignored }}
            './${{ inputs.mkdocs_repo_name }}/site/**/*.html'
          fail: true
        continue-on-error: false
